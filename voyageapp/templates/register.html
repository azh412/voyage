{% extends "layout.html" %}

{% block body %}

    <h1 class="display-1 bigvoy">Register</h1>
    <h6>Already have an account? <a href="{% url 'login' %}">Log in here.</a></h6>

    {% if error %}
        <div class="alert alert-warning" role="alert">
            {{error}}
        </div>
    {% endif %}

    <form action="{% url 'register' %}" method="post">
        {% csrf_token %}
        <div class="row">
            <div class="form-group mb-3 col">
                <input class="form-control" autofocus type="text" name="first_name" placeholder="First Name">
            </div>
            <div class="form-group mb-3 col">
                <input class="form-control" autofocus type="text" name="last_name" placeholder="Last Name">
            </div>
        </div>
        <div class="form-group mb-3">
            <input class="form-control" autofocus type="text" name="username" placeholder="Username">
        </div>
        <div class="form-group mb-3">
            <input class="form-control" type="email" name="email" placeholder="Email Address">
        </div>
        <div class="form-group mb-3">
            <input class="form-control" type="password" name="password" placeholder="Password">
            <div class="form-text">
                <p>Password needs at least eight characters, at least one letter, at least one number and at least one special character.</p>
            </div>
        </div>
        <div class="form-group mb-3">
            <input class="form-control" type="password" name="confirmation" placeholder="Confirm Password">
        </div>
        <input class="btn btn-primary" type="submit" value="Register">
    </form>


{% endblock %}
